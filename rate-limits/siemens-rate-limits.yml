  - Electrification
  - Industry
  - Manufacturing
  - Building Automation
  - Industrial IoT
  - Smart Buildings
  - Digital Twin
  - Rate Limiting
  - Quotas
  - Throttling
description: Machine-readable rate limit definitions for the Siemens API surface. Captures per-tier quotas,
  burst behavior, response signaling, and recovery semantics. Defaults are scaffold values to be replaced
  with published provider limits.
headers:
  limit: X-RateLimit-Limit
  remaining: X-RateLimit-Remaining
  reset: X-RateLimit-Reset
  retryAfter: Retry-After
  policy: RateLimit-Policy
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
