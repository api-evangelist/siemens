description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: siemens-free
    name: Free
    type: freemium
    description: Free entry tier for the Siemens API surface. Intended for evaluation, prototyping, and
      low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://buildingx.siemens.com/api/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://buildingx.siemens.com/api/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Siemens Airport Vertical API
      - name: Siemens Asset Vertical API
      - name: Siemens Baggage Vertical API
      - name: Siemens Container Vertical API
      - name: Siemens Flight Vertical API
      - name: Siemens ANYmal API and SDK
      - name: Siemens Battery Passport REST API
      - name: Siemens Building Operations API
  - id: siemens-pro
    name: Professional
    type: paid
    description: Production tier for Siemens. Provides higher quotas, priority support, and access to
      the broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://buildingx.siemens.com/api/v1
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://buildingx.siemens.com/api/v1
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://buildingx.siemens.com/api/v1
        unit: 1000
        price: TBD
        userMultiplied: false
