description: Siemens does not publish a unified public API pricing surface. APIs are bundled with
  individual industrial software products (e.g., Xcelerator, Simatic, Simotion, Insights Hub) and access
  is provisioned through enterprise software contracts, partner agreements, or product-specific licensing
  rather than a self-service developer plan.
sources:
  - https://www.siemens.com/
notes: No public, self-service API plans were located. API access and pricing are coupled to the
  underlying Siemens product license and negotiated through Siemens Digital Industries sales.
plans:
