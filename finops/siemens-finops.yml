description: FOCUS-aligned FinOps placeholder for Siemens. Siemens does not bill API consumption as
  a discrete line; cost is bundled into the underlying industrial software license or platform contract.
  No public usage telemetry or per-call billing surface is documented at the corporate level.
sources:
  - https://www.siemens.com/
notes: No corporate-wide API billing model. FinOps treatment is product-specific; reconciliation
  pending direct vendor confirmation per Siemens product.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
