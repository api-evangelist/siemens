meters:
  - name: license_subscription
    description: Siemens product license fee (per-product, per-seat, or per-asset depending on the
      product line); APIs ride on top of the licensed product.
    unit: varies
    aggregation: sum
    dimensions:
      - product
      - region
principles:
  - name: Visibility
    description: Spend visibility comes from the Siemens enterprise software invoice and asset/seat
      management within each product, not a unified usage API at the corporate level.
  - name: Allocation
    description: Allocate by Siemens product line, plant/site, and the engineering team operating the
      asset; tie back to procurement contract IDs.
  - name: Optimization
    description: Optimization is contractual and architectural — consolidate Siemens products, right-size
      seats and assets at renewal, and minimize duplicated platforms within the same plant.
  - name: Accountability
    description: Operations technology and procurement own the Siemens contract; integration teams
      own technical SLA conformance for each product API.
