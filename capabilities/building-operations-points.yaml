naftiko: 1.0.0-alpha2
info:
  label: Siemens Building Operations API — Points
  description: 'Siemens Building Operations API — Points. 4 operations. Lead operation: List Building Data Points. Self-contained
    Naftiko capability covering one Siemens business surface.'
  tags:
  - Siemens
  - Points
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIEMENS_API_KEY: SIEMENS_API_KEY
capability:
  consumes:
  - type: http
    namespace: building-operations-points
    baseUri: https://buildingx.siemens.com/api/v1
    description: Siemens Building Operations API — Points business capability. Self-contained, no shared references.
    resources:
    - name: points
      path: /points
      operations:
      - name: listpoints
        method: GET
        description: List Building Data Points
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: skip
          in: query
          type: integer
          description: Number of records to skip for pagination
        - name: top
          in: query
          type: integer
          description: Maximum number of records to return
        - name: filter
          in: query
          type: string
          description: OData filter expression for filtering points
    - name: points-pointId
      path: /points/{pointId}
      operations:
      - name: getpoint
        method: GET
        description: Get Building Data Point
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: points-pointId-value
      path: /points/{pointId}/value
      operations:
      - name: getpointvalue
        method: GET
        description: Get Point Current Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: setpointvalue
        method: PUT
        description: Set Point Value
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SIEMENS_API_KEY}}'
  exposes:
  - type: rest
    namespace: building-operations-points-rest
    port: 8080
    description: REST adapter for Siemens Building Operations API — Points. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/points
      name: points
      description: REST surface for points.
      operations:
      - method: GET
        name: listpoints
        description: List Building Data Points
        call: building-operations-points.listpoints
        with:
          skip: rest.skip
          top: rest.top
          filter: rest.filter
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/points/{pointid}
      name: points-pointid
      description: REST surface for points-pointId.
      operations:
      - method: GET
        name: getpoint
        description: Get Building Data Point
        call: building-operations-points.getpoint
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/points/{pointid}/value
      name: points-pointid-value
      description: REST surface for points-pointId-value.
      operations:
      - method: GET
        name: getpointvalue
        description: Get Point Current Value
        call: building-operations-points.getpointvalue
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: setpointvalue
        description: Set Point Value
        call: building-operations-points.setpointvalue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: building-operations-points-mcp
    port: 9090
    transport: http
    description: MCP adapter for Siemens Building Operations API — Points. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-building-data-points
      description: List Building Data Points
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: building-operations-points.listpoints
      with:
        skip: tools.skip
        top: tools.top
        filter: tools.filter
      outputParameters:
      - type: object
        mapping: $.
    - name: get-building-data-point
      description: Get Building Data Point
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: building-operations-points.getpoint
      outputParameters:
      - type: object
        mapping: $.
    - name: get-point-current-value
      description: Get Point Current Value
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: building-operations-points.getpointvalue
      outputParameters:
      - type: object
        mapping: $.
    - name: set-point-value
      description: Set Point Value
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: building-operations-points.setpointvalue
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
